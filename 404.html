<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback. Adjust pathSegmentsToKeep for your repo.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      var base = l.pathname
        .split("/")
        .slice(0, 1 + pathSegmentsToKeep)
        .join("/");
      var target =
        l.pathname.slice(1) + l.search + l.hash;
      l.replace(
        l.protocol +
          "//" +
          l.host +
          base +
          "/?p=" +
          encodeURIComponent(target)
      );
    </script>
  </head>
  <body></body>
</html>
